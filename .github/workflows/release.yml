name: release

on:
  workflow_dispatch:

permissions:
  contents: write
  statuses: read
  checks: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --jq "[.check_runs[] | select(.name == \"build\")] | sort_by(.completed_at) | last | .conclusion")
          if [ "$RESULT" != "success" ]; then
            echo "::error::CI job 'build' has not passed (result: $RESULT). Run CI first."
            exit 1
          fi
          echo "CI job 'build': passed"

      - name: Extract version from Directory.Build.props
        id: get-version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "## Release version: $VERSION" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "v${{ steps.get-version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.get-version.outputs.version }} already exists. Bump the version in Directory.Build.props first."
            exit 1
          fi

      - name: Verify RELEASE_NOTES.md exists and matches version
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if [ ! -f RELEASE_NOTES.md ]; then
            echo "::error::RELEASE_NOTES.md not found in repo root. Copy finalized release notes before releasing."
            exit 1
          fi
          HEADING=$(head -5 RELEASE_NOTES.md | grep -oP '(?<=## ).*' | head -1)
          if ! echo "$HEADING" | grep -q "$VERSION"; then
            echo "::error::RELEASE_NOTES.md heading '$HEADING' does not contain version '$VERSION'. Did you forget to update it?"
            exit 1
          fi
          echo "RELEASE_NOTES.md verified — heading matches version $VERSION"

  build-release:
    runs-on: ubuntu-latest
    needs: read-version
    strategy:
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish tools
        run: |
          for tool in SchemaQuench SchemaTongs DataTongs SchemaHammer; do
            dotnet publish $tool/$tool.csproj -c Release -r ${{ matrix.rid }} --self-contained
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: |
            SchemaQuench/bin/Release/net9.0/${{ matrix.rid }}/publish/
            SchemaTongs/bin/Release/net9.0/${{ matrix.rid }}/publish/
            DataTongs/bin/Release/net9.0/${{ matrix.rid }}/publish/
            SchemaHammer/bin/Release/net9.0/${{ matrix.rid }}/publish/
          retention-days: 1

  package-zip:
    runs-on: ubuntu-latest
    needs: [build-release, read-version]
    strategy:
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: bins

      - name: Assemble ZIP
        run: |
          VERSION="${{ needs.read-version.outputs.version }}"
          mkdir -p zip-staging
          for tool in SchemaQuench SchemaTongs DataTongs SchemaHammer; do
            src="bins/$tool/bin/Release/net9.0/${{ matrix.rid }}/publish"
            if [ -d "$src" ]; then
              cp "$src"/* zip-staging/ 2>/dev/null || true
            fi
          done
          rm -f zip-staging/*.pdb
          echo "ZIP contents:"
          ls -la zip-staging/
          cd zip-staging && zip -r "../SchemaSmithyFree-${VERSION}-${{ matrix.rid }}.zip" .

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.rid }}
          path: "SchemaSmithyFree-*.zip"
          retention-days: 5

  create-release:
    runs-on: ubuntu-latest
    needs: [package-zip, read-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all ZIPs
        uses: actions/download-artifact@v4
        with:
          pattern: zip-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f

      - name: Create tag
        run: |
          git tag "v${{ needs.read-version.outputs.version }}"
          git push origin "v${{ needs.read-version.outputs.version }}"

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.read-version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "SchemaSmithyFree v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            --draft \
            release-assets/*
